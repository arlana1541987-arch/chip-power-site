name: Deploy GitHub Pages mirror

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use npm 11 (lockfile generated with npm 11)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build site for Cloudflare
        run: npm run build

      - name: Deploy SSR build to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy .output/server --assets .output/public

      - name: Build GitHub Pages bundle
        run: npm run build:pages

      - name: Export static mirror for GitHub Pages
        run: |
          rm -rf .wrangler
          cd .output/server
          npx wrangler@4 dev --local --ip 127.0.0.1 --port 8790 &
          SERVER_PID=$!
          cd "$GITHUB_WORKSPACE"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8790/chip-power-site/ > /dev/null; then
              echo "Local SSR server ready"
              break
            fi
            sleep 1
          done
          PAGES_EXPORT_ORIGIN=http://127.0.0.1:8790 node scripts/export-github-pages.mjs
          kill $SERVER_PID 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
