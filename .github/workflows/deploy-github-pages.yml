name: Deploy GitHub Pages mirror

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use npm 11 (lockfile generated with npm 11)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy SSR build to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy .output/server --assets .output/public

      - name: Export static mirror for GitHub Pages
        env:
          PAGES_EXPORT_ORIGIN: https://arlana1541987-arch-chip-power-site.chip-power.workers.dev
        run: node scripts/export-github-pages.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
